version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: elms_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: elms_password
      MYSQL_DATABASE: elms_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pelms_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: elms_app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/elms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: elms_password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: "true"
      SERVER_PORT: 8080

volumes:
  mysql_data:
    driver: local
