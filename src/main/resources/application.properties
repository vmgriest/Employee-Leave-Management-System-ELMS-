# ============================================================
# ELMS Application Configuration
# IMPORTANT: Update DB credentials below before running.
# ============================================================

# Server
server.port=8080

# ---------------------------------------------------------------
# H2 In-Memory (active — no MySQL needed, data resets on restart)
# ---------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:elmsdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ---------------------------------------------------------------
# MySQL Configuration (swap in when MySQL is running)
# ---------------------------------------------------------------
#spring.datasource.url=jdbc:mysql://localhost:3306/elms_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
#spring.datasource.username=root
#spring.datasource.password=elms_password
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ---------------------------------------------------------------
# SpringDoc / Swagger UI
# ---------------------------------------------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# Application name
spring.application.name=Employee-Leave-Management-System
